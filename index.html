<!DOCTYPE html>
<html>
<head>
    <title>Health Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Health Tracker</h1>

    <section>
        <h2>Weekly Check-In</h2>

        <label for="checkin-date">Date</label>
        <input type="date" id="checkin-date">

        <label for="bodyweight">Bodyweight (kg)</label>
        <input type="number" id="bodyweight" step="0.1" placeholder="90.0">

        <button id="save-bodyweight-button">Save Bodyweight</button>
    </section>

    <section>
        <h2>Workout Session</h2>

        <label for="session-date">Date</label>
        <input type="date" id="session-date">

        <label for="workout-type">Workout Type</label>
        <select id="workout-type">
            <option value="">Select workout type</option>
            <option value="Upper Strength">Upper Strength</option>
            <option value="Lower Strength">Lower Strength</option>
            <option value="Upper Volume">Upper Volume</option>
            <option value="Lower Volume">Lower Volume</option>
            <option value="Mobility">Mobility</option>
        </select>
    </section>

    <section>
        <h2>Workout Plan</h2>
        <div id="workout-plan"></div>
    </section>

    <section>
        <h2>Current Session</h2>
        <div id="current-session"></div>
        <button id="save-session-button">Save Session</button>
    </section>

    <section>
        <h2>Future Improvements</h2>
        <p>TODO: Add an editable workout templates page so the program can be changed without editing code.</p>
    </section>

    <script src="script.js"></script>
</body>
</html>
