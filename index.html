<!DOCTYPE html>
<html>
<head>
    <title>Health Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Health Tracker</h1>

    <section>
        <h2>Weekly Check-In</h2>

        <label for="checkin-date">Date</label>
        <input type="date" id="checkin-date">

        <label for="bodyweight">Bodyweight (kg)</label>
        <input type="number" id="bodyweight" step="0.1" placeholder="90.0">

        <button id="save-bodyweight-button">Save Bodyweight</button>
    </section>

    <section>
        <h2>Training Session</h2>

        <label for="session-date">Date</label>
        <input type="date" id="session-date">

        <label for="session-type">Session Type</label>
        <select id="session-type">
            <option value="">Select session type</option>
            <option value="Speed Run">Day 1 - Speed Run</option>
            <option value="Upper Strength">Day 2 - Upper Strength</option>
            <option value="Easy Run">Day 3 - Easy Run</option>
            <option value="Lower Strength">Day 4 - Lower Strength</option>
            <option value="Tempo Run">Day 5 - Tempo Run</option>
            <option value="Full Body Volume">Day 6 - Full Body Volume</option>
            <option value="Long Run + Mobility">Day 7 - Long Run + Mobility</option>
        </select>
    </section>

    <section id="run-section">
        <h2>Run</h2>
        <div id="run-plan"></div>
    </section>

    <section id="main-section">
        <h2>Main Workout</h2>
        <div id="main-plan"></div>
    </section>

    <section id="mobility-section">
        <h2>Recovery / Mobility</h2>
        <div id="mobility-plan"></div>
    </section>

    <section>
        <button id="save-session-button">Save Session</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
