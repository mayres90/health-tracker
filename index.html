<!DOCTYPE html>
<html>
<head>
    <title>Workout Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Michael's Workout Tracker</h1>

    <h2>Today's Workout</h2>

    <label>Date:</label>
    <input type="date">

    <br><br>

    <label>Body Weight (kg):</label>
    <input type="number">

    <br><br>

    <label>Exercise:</label>
    <input type="text">

    <br><br>

    <label>Weight Lifted (kg):</label>
    <input type="number">

    <br><br>

    <label>Reps:</label>
    <input type="number">

    <br><br>

    <button>Save Workout</button>
</body>
</html>
